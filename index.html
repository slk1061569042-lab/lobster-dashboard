<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灵息大陆 — 素材看板</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a1a;--bg2:#0f172a;--bg3:#14102a;--bg4:#1a1030;--border:#2a2040;--blue:#4fc3f7;--purple:#ab47bc;--text:#e0dce8;--text2:#b0a8c8;--text3:#665f80;--green:#4ade80;--red:#f87171;--gold:#ffb347;--radius:10px}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
a{color:var(--blue);text-decoration:none}
.header{background:linear-gradient(135deg,#1a1030,#0d0820);padding:14px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.header h1{font-size:20px;color:#f0e6ff;white-space:nowrap}
.header h1 .accent{color:var(--gold)}
.header-stats{display:flex;gap:10px;font-size:12px}
.stat-box{background:var(--bg4);padding:4px 12px;border-radius:6px;border:1px solid var(--border)}
.stat-box .num{color:var(--gold);font-weight:bold;font-size:15px}
.tab-nav{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;padding:0 16px}
.tab-btn{padding:12px 20px;color:var(--text3);cursor:pointer;border:none;background:none;font-size:14px;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s}
.tab-btn:hover{color:var(--text2)}
.tab-btn.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab-content{display:none;padding:20px 24px}
.tab-content.active{display:block}
.controls{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:16px}
.controls input[type=text]{background:var(--bg4);border:1px solid var(--border);color:var(--text);padding:8px 14px;border-radius:6px;width:260px;font-size:14px}
.controls input::placeholder{color:var(--text3)}
.controls select{background:var(--bg4);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;font-size:13px}
.fbtn{background:var(--bg4);border:1px solid var(--border);color:var(--text2);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;transition:all .2s}
.fbtn:hover,.fbtn.active{background:#2a1850;border-color:#6a4faa;color:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
/* Card */
.card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:all .2s;position:relative}
.card:hover{border-color:var(--purple);transform:translateY(-2px);box-shadow:0 4px 20px rgba(100,60,200,.2)}
.card-img{width:100%;aspect-ratio:1;background:var(--bg);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-img.locked img{filter:brightness(0.08) saturate(0)}
.card-img.locked::after{content:'🔒';position:absolute;font-size:36px;top:50%;left:50%;transform:translate(-50%,-50%);text-shadow:0 0 20px rgba(0,0,0,.9);filter:drop-shadow(0 0 6px rgba(255,180,0,.4))}
.card-img .no-img{color:#4a4060;font-size:40px}
.card-body{padding:10px 12px}
.card-no{font-size:11px;color:var(--gold);font-weight:bold;font-family:monospace}
.card-name{font-size:14px;font-weight:bold;color:#f0e6ff;margin:2px 0}
.card-meta{display:flex;gap:4px;flex-wrap:wrap}
.tag{font-size:10px;padding:2px 6px;border-radius:4px}
.tag-stars{background:#3d2800;color:var(--gold)}
.tag-elem{border:1px solid #3a3050;color:var(--text2)}
.lock-toggle{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.8);border:2px solid rgba(255,180,0,.5);color:#fff;font-size:18px;width:34px;height:34px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;transition:all .2s;backdrop-filter:blur(4px)}
.lock-toggle:hover{background:var(--purple);border-color:var(--purple);transform:scale(1.1)}
.lock-toggle.is-public{border-color:var(--green);box-shadow:0 0 8px rgba(74,222,128,.3)}
.lock-toggle.is-locked{border-color:var(--red);box-shadow:0 0 8px rgba(248,113,113,.3)}
.elem-fire{color:#ff6b35}.elem-water{color:#3b8bff}.elem-wood{color:#4cd94c}
.elem-earth{color:#c08030}.elem-void{color:#a040f0}.elem-ice{color:#80e0ff}
.elem-thunder{color:#ffe020}.elem-poison{color:#b040d0}.elem-light{color:#ffe880}
.elem-neutral{color:#a0a0a0}.elem-dark{color:#8060b0}

.home-fab{position:fixed;bottom:24px;left:24px;width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:999;box-shadow:0 4px 16px rgba(79,195,247,.4);transition:all .3s;text-decoration:none;font-size:20px;border:none;color:#fff}
.home-fab:hover{transform:scale(1.1);box-shadow:0 6px 24px rgba(79,195,247,.6)}
.home-fab::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:2px solid rgba(79,195,247,.2);animation:fabPulse 2s infinite}
@keyframes fabPulse{0%,100%{opacity:0;transform:scale(1)}50%{opacity:1;transform:scale(1.15)}}
</style>
</head>
<body>
<a class="home-fab" href="/" title="回到首页">🏠</a>
<div class="header">
  <h1>🦞 龙虾游戏工作室 — <span class="accent">灵息大陆素材看板</span></h1>
  <div class="header-stats">
    <div class="stat-box">怪物 <span class="num" id="totalCount">0</span></div>
    <div class="stat-box hide-guest" style="display:none">有立绘 <span class="num" id="fbCount">0</span></div>
    <div class="stat-box hide-guest" style="display:none">缺立绘 <span class="num" id="missFbCount">0</span></div>
    <div class="stat-box hide-guest" id="adminBadge" style="display:none;background:#1a3020;border-color:#4ade80;color:#4ade80">🔑 管理模式</div>
    <div class="stat-box" id="dataStatusBox" style="display:none"><span id="dataStatus" style="font-size:11px;color:var(--text3)"></span></div>
    <button class="fbtn" id="refreshBtn" style="display:none" onclick="triggerRefresh()" title="触发 GitHub Actions 更新数据">🔄 刷新数据</button>
  </div>
</div>
<div class="tab-nav">
  <button class="tab-btn active" data-tab="monsters">🐾 怪物图鉴</button>
  <button class="tab-btn" data-tab="buildings">🏠 建筑/环境</button>
  <button class="tab-btn" data-tab="backgrounds">🌄 场景背景</button>
  <button class="tab-btn hide-guest" data-tab="workshop">🔧 AI 工坊</button>
  <button class="tab-btn hide-guest" data-tab="gamedata">📊 游戏数据</button>
  <button class="tab-btn hide-guest" data-tab="rules">📋 团队规则</button>
</div>
<div class="tab-content active" id="tab-monsters">
  <div class="controls">
    <input type="text" id="search" placeholder="🔍 搜索编号 / 名字 / 属性...">
    <select id="sortBy">
      <option value="card-no">编号 ↑</option>
      <option value="card-no-desc">编号 ↓</option>
      <option value="stars-desc">星级 ↓</option>
      <option value="stars-asc">星级 ↑</option>
      <option value="name">名字</option>
      <option value="element">属性</option>
    </select>
    <button class="fbtn active" data-filter="all">全部</button>
    <button class="fbtn hide-guest" data-filter="has-fb">有立绘</button>
    <button class="fbtn hide-guest" data-filter="no-fb">缺立绘</button>
    <span id="adminBatchBtns" style="display:none;margin-left:auto">
      <button class="fbtn" onclick="batchPublic(MONSTERS.map(m=>m.id),true)" style="border-color:#4ade80;color:#4ade80">全部公开</button>
      <button class="fbtn" onclick="batchPublic(MONSTERS.map(m=>m.id),false)" style="border-color:#f87171;color:#f87171">全部锁定</button>
    </span>
  </div>
  <div class="grid" id="monsterGrid"></div>
</div>
<div class="tab-content" id="tab-buildings"><div style="text-align:center;padding:60px;color:var(--text3)">🏠 建筑/环境素材管理 — 开发中</div></div>
<div class="tab-content" id="tab-backgrounds"><div style="text-align:center;padding:60px;color:var(--text3)">🌄 场景背景管理 — 开发中</div></div>
<div class="tab-content" id="tab-workshop"><div style="text-align:center;padding:60px;color:var(--text3)">🔧 AI 工坊 — 开发中</div></div>
<div class="tab-content" id="tab-gamedata">
  <iframe src="data_dashboard.html" style="width:100%;height:80vh;border:none;border-radius:10px;"></iframe>
</div>
<div class="tab-content" id="tab-rules"><div style="text-align:center;padding:60px;color:var(--text3)">📋 团队规则 — 开发中</div></div>
</body>
</html>
<style>
/* Lightbox */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;display:none;align-items:center;justify-content:center;cursor:zoom-out}
.lightbox.show{display:flex}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:8px;box-shadow:0 0 40px rgba(100,60,200,.3)}
/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:30px 20px;overflow-y:auto}
.modal-overlay.show{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:12px;width:100%;max-width:960px;max-height:90vh;overflow-y:auto}
.modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:10}
.modal-head h2{font-size:18px;color:#f0e6ff}
.modal-head h2 .mno{color:var(--gold);margin-right:6px}
.modal-close{background:none;border:none;color:var(--text3);font-size:24px;cursor:pointer;padding:4px 8px}
.modal-close:hover{color:var(--red)}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
@media(max-width:700px){.modal-grid{grid-template-columns:1fr}}
.modal-left{padding:20px;border-right:1px solid var(--border)}
.modal-right{padding:20px;overflow-y:auto;max-height:70vh}
.preview-main{width:100%;aspect-ratio:1;background:var(--bg);border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:zoom-in;margin-bottom:12px}
.preview-main img{max-width:100%;max-height:100%;object-fit:contain}
.preview-main .no-img{color:var(--text3);font-size:48px}
.preview-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.ptab{padding:4px 10px;border-radius:6px;font-size:12px;cursor:pointer;background:var(--bg4);border:1px solid var(--border);color:var(--text2);transition:all .2s}
.ptab:hover,.ptab.active{background:#2a1850;border-color:var(--purple);color:#fff}
.ptab.has::after{content:'';display:inline-block;width:6px;height:6px;background:var(--green);border-radius:50%;margin-left:4px;vertical-align:middle}
.ptab.miss::after{content:'';display:inline-block;width:6px;height:6px;background:var(--red);border-radius:50%;margin-left:4px;vertical-align:middle}
/* Info sections */
.info-section{margin-bottom:16px}
.info-section h3{font-size:14px;color:var(--blue);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.info-item{display:flex;justify-content:space-between;padding:4px 8px;background:var(--bg4);border-radius:4px;font-size:12px}
.info-label{color:var(--text3)}
.info-value{color:var(--text);font-weight:500}
/* Editable field */
.edit-field{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:3px 6px;border-radius:4px;font-size:12px;width:80px;text-align:right}
.edit-field:focus{border-color:var(--blue);outline:none}
/* Asset management */
.asset-list{list-style:none}
.asset-item{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;border-bottom:1px solid #1a1530;font-size:12px}
.asset-item .status{margin-right:8px}
.asset-item .name{flex:1;color:var(--text2)}
.asset-item .actions{display:flex;gap:4px}
.btn{padding:4px 10px;border-radius:5px;border:1px solid var(--border);cursor:pointer;font-size:11px;transition:all .2s}
.btn-sm{padding:3px 8px;font-size:10px}
.btn-primary{background:var(--blue);color:#000;border-color:var(--blue)}
.btn-primary:hover{background:#3aa8d8}
.btn-purple{background:var(--purple);color:#fff;border-color:var(--purple)}
.btn-purple:hover{background:#8e24aa}
.btn-danger{background:transparent;color:var(--red);border-color:var(--red)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-ghost{background:transparent;color:var(--text2);border-color:var(--border)}
.btn-ghost:hover{background:var(--bg4);color:var(--text)}
.btn-green{background:transparent;color:var(--green);border-color:var(--green)}
.btn-green:hover{background:var(--green);color:#000}
/* AI panel */
.ai-section{background:var(--bg4);border:1px solid var(--border);border-radius:8px;padding:12px;margin-top:12px}
.ai-section h4{font-size:13px;color:var(--purple);margin-bottom:8px}
.ai-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;font-size:12px}
.ai-row label{color:var(--text3);min-width:40px}
.ai-row input,.ai-row select{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:4px;font-size:12px;flex:1}
.ai-result{margin-top:10px;padding:10px;background:var(--bg);border-radius:6px;display:none}
.ai-result.show{display:block}
.ai-result img{max-width:100%;border-radius:4px;margin-bottom:6px}
/* Toast */
.toast-container{position:fixed;top:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{padding:10px 16px;border-radius:8px;font-size:13px;color:#fff;animation:fadeIn .3s,fadeOut .3s 3.5s}
.toast-success{background:#166534}.toast-error{background:#991b1b}.toast-info{background:#1e3a5f}
@keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
.loading{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* Description */
.desc-text{font-size:12px;color:var(--text2);line-height:1.6;padding:6px 0}
.lore-text{font-size:11px;color:var(--text3);font-style:italic;line-height:1.5;padding:6px 8px;background:var(--bg);border-radius:4px;border-left:3px solid var(--purple)}

.home-fab{position:fixed;bottom:24px;left:24px;width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:999;box-shadow:0 4px 16px rgba(79,195,247,.4);transition:all .3s;text-decoration:none;font-size:20px;border:none;color:#fff}
.home-fab:hover{transform:scale(1.1);box-shadow:0 6px 24px rgba(79,195,247,.6)}
.home-fab::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:2px solid rgba(79,195,247,.2);animation:fabPulse 2s infinite}
@keyframes fabPulse{0%,100%{opacity:0;transform:scale(1)}50%{opacity:1;transform:scale(1.15)}}
</style>
<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="this.classList.remove('show')"><img id="lightboxImg"></div>
<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalBox"></div>
</div>
<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<script>
const API='';
const ADMIN_KEY='lobster2026';
const IS_ADMIN=new URLSearchParams(location.search).get('key')===ADMIN_KEY;
let MONSTERS=[];
const EC={fire:'🔥火',water:'💧水',wood:'🌿木',earth:'🪨土',void:'🌀虚空',ice:'❄️冰',thunder:'⚡雷',poison:'☠️毒',light:'✨光',neutral:'⚪中立',dark:'🌑暗'};
const EL={fire:'elem-fire',water:'elem-water',wood:'elem-wood',earth:'elem-earth',void:'elem-void',ice:'elem-ice',thunder:'elem-thunder',poison:'elem-poison',light:'elem-light',neutral:'elem-neutral',dark:'elem-dark'};
const RACE_CN={beast:'兽',undead:'亡灵',plant:'植物',elemental:'元素',dragon:'龙',demon:'魔',spirit:'灵',human:'人',machine:'机械',insect:'虫'};
const CLASS_CN={warrior:'战士',mage:'法师',assassin:'刺客',tank:'坦克',support:'辅助',ranger:'游侠'};

function toast(msg,type='info'){
  const c=document.getElementById('toastContainer'),el=document.createElement('div');
  el.className='toast toast-'+type;el.textContent=msg;c.appendChild(el);
  setTimeout(()=>el.remove(),4000);
}

function lightbox(src){
  if(!src)return;
  document.getElementById('lightboxImg').src=src;
  document.getElementById('lightbox').classList.add('show');
}

// ===== Data =====
const IS_GITHUB_PAGES=location.hostname.includes('github.io');
let DATA_UPDATED_AT='';

async function loadMonsters(){
  try{
    if(IS_GITHUB_PAGES){
      const r=await fetch('monsters_data.json?t='+Date.now());
      MONSTERS=await r.json();
      // Try to get last update time from git
      try{const m=await fetch('data_meta.json?t='+Date.now());const meta=await m.json();DATA_UPDATED_AT=meta.updated_at||'';}catch{}
    }else{
      const r=await fetch(API+'/api/monsters');
      MONSTERS=await r.json();
    }
    updateStats();renderGrid();
    if(IS_GITHUB_PAGES)updateDataStatus();
  }catch(e){toast('加载失败: '+e.message,'error');}
}

function updateDataStatus(){
  const el=document.getElementById('dataStatus');
  if(el){
    el.textContent=DATA_UPDATED_AT?'数据更新: '+DATA_UPDATED_AT:'静态数据模式';
    el.title='GitHub Pages 静态模式，点击刷新按钮同步最新数据';
  }
}

function updateStats(){
  document.getElementById('totalCount').textContent=MONSTERS.length;
  if(IS_ADMIN){
    const fb=MONSTERS.filter(m=>m.has_fullbody).length;
    document.getElementById('fbCount').textContent=fb;
    document.getElementById('missFbCount').textContent=MONSTERS.length-fb;
  }
}

function getFiltered(){
  const q=document.getElementById('search').value.toLowerCase();
  const f=document.querySelector('#tab-monsters .fbtn.active')?.dataset.filter||'all';
  const s=document.getElementById('sortBy').value;
  let list=MONSTERS.filter(m=>{
    if(f==='has-fb'&&!m.has_fullbody)return false;
    if(f==='no-fb'&&m.has_fullbody)return false;
    if(!IS_ADMIN&&!m.public)return f==='all';// show locked in 'all'
    if(q){
      const t=`${m.card_no} ${m.id} ${m.name} ${m.element} ${m.race} ${m.stars}`.toLowerCase();
      if(!t.includes(q))return false;
    }
    return true;
  });
  list.sort((a,b)=>{
    if(s==='card-no')return(a.card_no||999)-(b.card_no||999);
    if(s==='card-no-desc')return(b.card_no||0)-(a.card_no||0);
    if(s==='stars-desc')return b.stars-a.stars||(a.card_no||999)-(b.card_no||999);
    if(s==='stars-asc')return a.stars-b.stars||(a.card_no||999)-(b.card_no||999);
    if(s==='name')return a.name.localeCompare(b.name,'zh');
    if(s==='element')return(a.element||'').localeCompare(b.element||'')||b.stars-a.stars;
    return 0;
  });
  return list;
}

// ===== Grid Render =====
function renderGrid(){
  const list=getFiltered();
  const g=document.getElementById('monsterGrid');
  g.innerHTML=list.map(m=>{
    const unlocked=IS_ADMIN||m.public;
    const hasImg=m.has_fullbody;
    return `<div class="card" onclick="${unlocked?`showModal('${m.id}')`:`toast('该怪物尚未公开','info')`}">
      <div class="card-img${hasImg&&!unlocked?' locked':''}">
        ${hasImg?`<img src="/assets/monsters/${m.id}/thumb.png" loading="lazy" onerror="this.src='/assets/monsters/${m.id}/fullbody.png'">`:`<div class="no-img">?</div>`}
        ${IS_ADMIN?`<button class="lock-toggle ${m.public?'is-public':'is-locked'}" onclick="event.stopPropagation();togglePublic('${m.id}')" title="${m.public?'点击锁定':'点击解锁'}">${m.public?'🔓':'🔒'}</button>`:''}
      </div>
      <div class="card-body">
        <div class="card-no">#${String(m.card_no||'?').padStart(3,'0')}</div>
        <div class="card-name">${m.name}</div>
        <div class="card-meta">
          <span class="tag tag-stars">${'⭐'.repeat(Math.min(m.stars||0,5))} ${m.stars||0}</span>
          <span class="tag tag-elem ${EL[m.element]||''}">${EC[m.element]||m.element||'?'}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ===== Toggle Public =====
async function togglePublic(id){
  const m=MONSTERS.find(x=>x.id===id);if(!m)return;
  // 乐观更新：先改 UI
  const oldVal=m.public;
  m.public=!oldVal;
  renderGrid();
  // 异步写数据库
  try{
    const r=await fetch(API+'/api/monsters/'+id+'/toggle-public',{method:'POST'});
    if(!r.ok)throw new Error(r.status);
    toast(m.public?'🔓 已公开 #'+m.card_no+' '+m.name:'🔒 已锁定 #'+m.card_no+' '+m.name,'success');
  }catch(e){
    // 回滚
    m.public=oldVal;renderGrid();
    toast('切换失败，已回滚','error');
  }
}
async function batchPublic(ids,pub){
  // 乐观更新
  const backup=MONSTERS.map(m=>({id:m.id,public:m.public}));
  MONSTERS.forEach(m=>{if(ids.includes(m.id))m.public=pub;});
  renderGrid();
  try{
    const r=await fetch(API+'/api/monsters/batch-public',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ids,public:pub})});
    if(!r.ok)throw new Error(r.status);
    const d=await r.json();
    toast(`批量${pub?'公开':'锁定'} ${d.updated} 个`,'success');
  }catch(e){
    backup.forEach(b=>{const m=MONSTERS.find(x=>x.id===b.id);if(m)m.public=b.public;});
    renderGrid();toast('批量操作失败，已回滚','error');
  }
}

// ===== Modal =====
function closeModal(){document.getElementById('modalOverlay').classList.remove('show');}

    {key:'fullbody',label:'立绘',ext:'png',has:m.has_fullbody},
    {key:'portrait',label:'头像',ext:'png',has:m.has_portrait},
    {key:'icon',label:'图标',ext:'png',has:false},
  ];
  box.innerHTML=`
  <div class="modal-head">
    <h2><span class="mno">#${String(m.card_no||'?').padStart(3,'0')}</span>${m.name} <span style="color:var(--text3);font-size:13px;font-weight:normal">${m.id}</span></h2>
    <button class="modal-close" onclick="closeModal()">&times;</button>
  </div>
  <div class="modal-grid">
    <div class="modal-left">
      <div class="preview-tabs" id="previewTabs">
        ${assets.map((a,i)=>`<button class="ptab ${a.has?'has':'miss'}${i===0?' active':''}" data-asset="${a.key}">${a.label}</button>`).join('')}
      </div>
      <div class="preview-main" id="previewMain" onclick="lightbox(this.querySelector('img')?.src)">
        ${m.has_fullbody?`<img src="/assets/monsters/${m.id}/fullbody.png">`:'<div class="no-img">无素材</div>'}
      </div>
      ${IS_ADMIN?`<div style="display:flex;gap:6px;flex-wrap:wrap" id="assetActions">
        <button class="btn btn-ghost btn-sm" onclick="lightbox(document.querySelector('#previewMain img')?.src)">🔍 大图</button>
        <button class="btn btn-danger btn-sm" id="btnDelAsset" onclick="deleteCurrentAsset('${m.id}')">🗑️ 删除</button>
        <label class="btn btn-green btn-sm" style="cursor:pointer">📤 上传<input type="file" accept="image/*" style="display:none" onchange="uploadAsset('${m.id}',this)"></label>
      </div>`:''}
      <p class="desc-text" style="margin-top:10px">${m.description||''}</p>
      ${m.lore?.flavor_text?`<div class="lore-text">${m.lore.flavor_text}</div>`:''}
    </div>
    <div class="modal-right">
      <div class="info-section">
        <h3>📋 基本属性</h3>
        <div class="info-grid">
          ${infoRow('编号','#'+m.card_no,'card_no',m,IS_ADMIN)}
          ${infoRow('星级','⭐'.repeat(Math.min(m.stars||0,5))+' '+m.stars,'stars',m,IS_ADMIN)}
          ${infoRow('属性',EC[m.element]||m.element,'element',m,IS_ADMIN,EL[m.element])}
          ${infoRow('种族',RACE_CN[m.race]||m.race||'-','race',m,IS_ADMIN)}
          ${infoRow('职业',CLASS_CN[m.class]||m.class||'-','class',m,IS_ADMIN)}
          ${infoRow('HP',m.hp,'hp',m,IS_ADMIN)}
          ${infoRow('ATK',m.base_atk,'base_atk',m,IS_ADMIN)}
          ${infoRow('DEF',m.base_def,'base_def',m,IS_ADMIN)}
          ${infoRow('SPD',m.spd,'spd',m,IS_ADMIN)}
          ${infoRow('捕获难度',m.capture_difficulty,'capture_difficulty',m,IS_ADMIN)}
          ${infoRow('场景',m.scene||'-','scene',m,false)}
        </div>
      </div>
      ${IS_ADMIN?renderSkillSection(m):''}
      ${IS_ADMIN?renderAssetSection(m):''}
      ${IS_ADMIN?renderAISection(m):''}
    </div>
  </div>`;
  document.getElementById('modalOverlay').classList.add('show');
  bindPreviewTabs(m);
}

function infoRow(label,val,field,m,editable,cls){
  if(editable&&typeof m[field]!=='undefined'&&['stars','hp','base_atk','base_def','spd','capture_difficulty','card_no'].includes(field)){
    return `<div class="info-item"><div class="info-label">${label}</div><input class="edit-field" value="${m[field]}" onchange="updateField('${m.id}','${field}',this.value)"></div>`;
  }
  return `<div class="info-item"><div class="info-label">${label}</div><div class="info-value ${cls||''}">${val}</div></div>`;
}

function bindPreviewTabs(m){
  document.querySelectorAll('.ptab').forEach(t=>{
    t.onclick=()=>{
      document.querySelectorAll('.ptab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      const k=t.dataset.asset;
      const p=document.getElementById('previewMain');
      const has=k==='fullbody'?m.has_fullbody:k==='portrait'?m.has_portrait:false;
      p.innerHTML=has?`<img src="/assets/monsters/${m.id}/${k}.png?t=${Date.now()}">`:'<div class="no-img">无素材</div>';
    };
  });
}

// ===== Skill Section =====
function renderSkillSection(m){
  const passive=m.passive||{};
  const active=m.active_skill||{};
  const skills=m.skills_desc||[];
  return `<div class="info-section">
    <h3>⚔️ 技能</h3>
    <div class="asset-item"><span class="name"><b>被动:</b> ${passive.name||'-'}</span></div>
    ${m.effects?.passive?`<div style="font-size:11px;color:var(--text2);padding:2px 8px">${m.effects.passive.desc||''}</div>`:''}
    <div class="asset-item"><span class="name"><b>主动:</b> ${active.name||'-'}</span></div>
    ${active.desc?`<div style="font-size:11px;color:var(--text2);padding:2px 8px">${active.desc}</div>`:''}
    ${skills.length?skills.map(s=>`<div class="asset-item"><span class="name">${s.icon||'🔹'} ${s.name}: ${s.desc}</span></div>`).join(''):''}
    ${m.bonds?.length?`<div style="margin-top:6px"><b style="font-size:11px;color:var(--gold)">羁绊:</b>${m.bonds.map(b=>`<div style="font-size:11px;color:var(--text2);padding:2px 8px">${b.desc}</div>`).join('')}</div>`:''}
    ${m.weaknesses?.length?`<div style="margin-top:4px"><b style="font-size:11px;color:var(--red)">弱点:</b>${m.weaknesses.map(w=>`<span style="font-size:11px;color:var(--text2);margin-left:8px">${EC[w.attr]||w.attr} ×${w.multiplier}</span>`).join('')}</div>`:''}
  </div>`;
}

// ===== Asset Management Section =====
function renderAssetSection(m){
  const items=[
    {key:'fullbody.png',label:'立绘',has:m.has_fullbody},
    {key:'portrait.png',label:'头像',has:m.has_portrait},
    {key:'icon.png',label:'图标',has:false},
    {key:'animations/idle/',label:'待机动画',has:m.has_spritesheet},
    {key:'animations/walk/',label:'行走动画',has:false},

  ];

        <span class="name">${a.label} <span style="color:var(--text3)">${a.key}</span></span>
        <span class="actions">
          ${a.has?`<button class="btn btn-ghost btn-sm" onclick="viewAsset('${m.id}','${a.key}')">👁</button>
          <button class="btn btn-danger btn-sm" onclick="delAsset('${m.id}','${a.key}')">🗑</button>`
          :`<label class="btn btn-green btn-sm" style="cursor:pointer">📤<input type="file" style="display:none" onchange="uploadAssetTo('${m.id}','${a.key}',this)"></label>`}
          <button class="btn btn-purple btn-sm" onclick="aiGenFor('${m.id}','${a.key}')">🤖</button>
        </span>
      </li>`).join('')}
    </ul>
  </div>`;
}

// ===== AI Generation Section =====
function renderAISection(m){
  return `<div class="ai-section">
    <h4>🤖 AI 生成工具</h4>
    <div class="ai-row">
      <label>工具</label>
      <select id="aiTool" onchange="updateAIOptions('${m.id}')">
        <option value="generatePose">🎭 姿势生成</option>
        <option value="animateSprite">🎬 精灵图动画</option>
        <option value="editImage">✏️ 修图</option>
        <option value="createSoundEffect">🔊 音效</option>
        <option value="createMusic">🎵 音乐</option>
        <option value="createVoice">🗣️ 语音</option>
        <option value="removeBackground">🖼️ 去背景</option>
      </select>
    </div>
    <div id="aiOpts">${aiOptions('generatePose',m)}</div>
    <div style="display:flex;gap:6px;margin-top:8px">
      <button class="btn btn-primary" id="aiGenBtn" onclick="runAI('${m.id}')">⚡ 生成</button>
      <button class="btn btn-ghost" onclick="document.getElementById('aiResult').className='ai-result'">清除</button>
    </div>
    <div class="ai-result" id="aiResult"></div>
  </div>`;
}

const POSES=['idle_front','idle_back','idle_left','idle_right','walk_left','walk_right','run_left','run_right','attack_ready','jump','flying','defending','sleeping'];

function aiOptions(tool,m){
  if(tool==='generatePose') return `<div class="ai-row"><label>姿势</label><select id="aiPose">${POSES.map(p=>`<option>${p}</option>`).join('')}</select></div><div class="ai-row"><label>描述</label><input id="aiDesc" value="${m.name} idle pose"></div>`;
  if(tool==='animateSprite') return `<div class="ai-row"><label>输入</label><select id="aiAnimSrc"><option value="fullbody">立绘</option><option value="portrait">头像</option></select></div><div class="ai-row"><label>动作</label><input id="aiMotion" value="idle breathing"></div><div class="ai-row"><label>帧数</label><input type="number" id="aiFrames" value="36" style="width:60px"><label>尺寸</label><input type="number" id="aiSize" value="256" style="width:60px"></div>`;
  if(tool==='editImage') return `<div class="ai-row"><label>素材</label><select id="aiEditSrc"><option value="fullbody">立绘</option><option value="portrait">头像</option></select></div><div class="ai-row"><label>指令</label><input id="aiEditCmd" placeholder="remove background, add glow..."></div>`;
  if(tool==='createSoundEffect') return `<div class="ai-row"><label>描述</label><input id="aiSfxDesc" value="${m.name} ${m.element||''} sound effect"></div><div class="ai-row"><label>时长</label><select id="aiSfxDur"><option value="1">1秒</option><option value="2" selected>2秒</option><option value="3">3秒</option><option value="5">5秒</option></select></div>`;
  if(tool==='createMusic') return `<div class="ai-row"><label>描述</label><input id="aiMusicDesc" value="${m.name} battle theme"></div><div class="ai-row"><label>时长</label><select id="aiMusicDur"><option value="10">10秒</option><option value="30" selected>30秒</option><option value="60">60秒</option></select></div>`;
  if(tool==='createVoice') return `<div class="ai-row"><label>台词</label><input id="aiVoiceText" value="${m.battle_lines?.on_appear||m.name+'登场'}"></div>`;
  if(tool==='removeBackground') return `<div class="ai-row"><label>素材</label><select id="aiRmBgSrc"><option value="fullbody">立绘</option><option value="portrait">头像</option></select></div>`;
  return '';
}

function updateAIOptions(id){
  const m=MONSTERS.find(x=>x.id===id);if(!m)return;
  document.getElementById('aiOpts').innerHTML=aiOptions(document.getElementById('aiTool').value,m);
}

function aiGenFor(id,key){
  // auto-select tool based on asset key
  const toolMap={'fullbody.png':'editImage','portrait.png':'editImage','icon.png':'editImage','animations/idle/':'animateSprite','animations/walk/':'animateSprite','animations/attack/':'animateSprite','sfx/':'createSoundEffect','voice/':'createVoice'};
  const tool=toolMap[key]||'generatePose';
  const sel=document.getElementById('aiTool');if(sel){sel.value=tool;updateAIOptions(id);}
  document.querySelector('.ai-section')?.scrollIntoView({behavior:'smooth'});
}

// ===== Run AI =====
let ludoBusy=false;
async function runAI(id){
  if(ludoBusy){toast('Ludo 正在处理，请稍候','info');return;}
  const tool=document.getElementById('aiTool').value;
  const m=MONSTERS.find(x=>x.id===id);if(!m)return;
  let payload={};
  const imgUrl=(asset)=>new URL(`/assets/monsters/${id}/${asset}.png`,location.href).href;
  if(tool==='generatePose'){payload={image_url:imgUrl('fullbody'),pose:document.getElementById('aiPose').value,description:document.getElementById('aiDesc').value};}
  else if(tool==='animateSprite'){payload={image_url:imgUrl(document.getElementById('aiAnimSrc').value),motion_prompt:document.getElementById('aiMotion').value,num_frames:+document.getElementById('aiFrames').value||36,frame_size:+document.getElementById('aiSize').value||256,generate_gif:true,generate_mp4:true};}
  else if(tool==='editImage'){payload={image_url:imgUrl(document.getElementById('aiEditSrc').value),edit_prompt:document.getElementById('aiEditCmd').value};}
  else if(tool==='createSoundEffect'){payload={description:document.getElementById('aiSfxDesc').value,duration:+document.getElementById('aiSfxDur').value||2};}
  else if(tool==='createMusic'){payload={description:document.getElementById('aiMusicDesc').value,duration:+document.getElementById('aiMusicDur').value||30};}
  else if(tool==='createVoice'){payload={text:document.getElementById('aiVoiceText').value};}
  else if(tool==='removeBackground'){payload={image_url:imgUrl(document.getElementById('aiRmBgSrc').value)};}

  const btn=document.getElementById('aiGenBtn');btn.disabled=true;btn.innerHTML='<span class="loading"></span> 生成中...';
  ludoBusy=true;
  try{
    const r=await fetch(API+'/api/ludo/'+tool,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    if(!r.ok)throw new Error('API '+r.status);
    const data=await r.json();
    showAIResult(tool,data,id);toast('生成成功！','success');
  }catch(e){toast('生成失败: '+e.message,'error');}
  finally{ludoBusy=false;btn.disabled=false;btn.textContent='⚡ 生成';}
}

function showAIResult(tool,data,id){
  const rd=document.getElementById('aiResult');rd.className='ai-result show';
  const url=data.image_url||data.images?.[0]?.url||data.audio_url||data.url||data.gif_url||'';
  let h='<b style="color:var(--green)">结果:</b><br>';
  if(url&&(url.endsWith('.png')||url.endsWith('.jpg')||url.endsWith('.webp')||tool.includes('Image')||tool.includes('Pose')||tool.includes('Background'))){
    h+=`<img src="${url}" onclick="lightbox('${url}')"><div style="display:flex;gap:4px;margin-top:6px"><button class="btn btn-primary btn-sm" onclick="saveAsset('${id}','fullbody.png','${url}')">保存为立绘</button><button class="btn btn-purple btn-sm" onclick="stageAsset('${id}','result.png','${url}')">暂存</button><a class="btn btn-ghost btn-sm" href="${url}" download>下载</a></div>`;
  }else if(data.spritesheet_url||data.gif_url){
    const ss=data.spritesheet_url||'';const gif=data.gif_url||data.gif||'';
    if(ss)h+=`<img src="${ss}" onclick="lightbox('${ss}')"><p style="font-size:11px;color:var(--text3)">精灵图集</p>`;
    if(gif)h+=`<img src="${gif}" style="margin-top:6px"><p style="font-size:11px;color:var(--text3)">GIF 预览</p>`;
    h+=`<div style="display:flex;gap:4px;margin-top:6px"><button class="btn btn-primary btn-sm" onclick="saveAsset('${id}','animations/idle/spritesheet.png','${ss||gif}')">保存到 idle/</button><button class="btn btn-purple btn-sm" onclick="stageAsset('${id}','spritesheet.png','${ss||gif}')">暂存</button></div>`;
  }else if(url){
    h+=`<audio controls src="${url}"></audio><div style="display:flex;gap:4px;margin-top:6px"><button class="btn btn-primary btn-sm" onclick="saveAsset('${id}','sfx/idle.wav','${url}')">保存</button><a class="btn btn-ghost btn-sm" href="${url}" download>下载</a></div>`;
  }
  h+=`<details style="margin-top:6px"><summary style="font-size:10px;color:var(--text3);cursor:pointer">原始数据</summary><pre style="font-size:10px;color:var(--text3);white-space:pre-wrap;max-height:120px;overflow:auto">${JSON.stringify(data,null,2)}</pre></details>`;
  rd.innerHTML=h;
}

// ===== Asset Operations =====
async function saveAsset(id,sub,url){
  try{const r=await fetch(API+'/api/assets/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'monsters',id,subpath:sub,url})});if(!r.ok)throw new Error(r.status);toast('保存成功','success');}catch(e){toast('保存失败','error');}
}
async function stageAsset(id,sub,url){
  try{const r=await fetch(API+'/api/assets/stage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'monsters',id,subpath:sub,url})});if(!r.ok)throw new Error(r.status);toast('已暂存','success');}catch(e){toast('暂存失败','error');}
}
async function replaceAsset(id,sub,url){
  try{const r=await fetch(API+'/api/assets/replace',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'monsters',id,subpath:sub,url})});if(!r.ok)throw new Error(r.status);toast('替换成功','success');}catch(e){toast('替换失败','error');}
}
function viewAsset(id,key){
  const src=`/assets/monsters/${id}/${key}`;
  if(key.endsWith('.png')||key.endsWith('.jpg'))lightbox(src);
  else window.open(src,'_blank');
}
async function delAsset(id,key){
  if(!confirm(`确定删除 ${id}/${key}？`))return;
  toast('删除功能开发中','info');
}
function deleteCurrentAsset(id){
  const active=document.querySelector('.ptab.active');
  if(active)delAsset(id,active.dataset.asset+'.png');
}
async function uploadAsset(id,input){
  const file=input.files[0];if(!file)return;
  const active=document.querySelector('.ptab.active')?.dataset.asset||'fullbody';
  await uploadFile(id,active+'.png',file);
}
async function uploadAssetTo(id,key,input){
  const file=input.files[0];if(!file)return;
  await uploadFile(id,key,file);
}
async function uploadFile(id,subpath,file){
  const fd=new FormData();fd.append('file',file);fd.append('type','monsters');fd.append('id',id);fd.append('subpath',subpath);
  try{
    const r=await fetch(API+'/api/assets/upload',{method:'POST',body:fd});
    if(!r.ok)throw new Error(r.status);
    toast('上传成功','success');
    // refresh
    await loadMonsters();showModal(id);
  }catch(e){toast('上传失败: '+e.message,'error');}
}

// ===== Update Field =====
async function updateField(id,field,val){
  try{
    const numFields=['stars','hp','base_atk','base_def','spd','card_no'];
    const v=numFields.includes(field)?Number(val):field==='capture_difficulty'?parseFloat(val):val;
    const r=await fetch(API+'/api/monsters/'+id+'/update',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({[field]:v})});
    if(!r.ok)throw new Error(r.status);
    const m=MONSTERS.find(x=>x.id===id);if(m)m[field]=v;
    renderGrid();toast(`${field} 已更新`,'success');
  }catch(e){toast('更新失败: '+e.message,'error');}
}

// ===== Init =====
async function triggerRefresh(){
  const btn=document.getElementById('refreshBtn');
  btn.disabled=true;btn.textContent='⏳ 刷新中...';
  try{
    // Reload data with cache bust
    const r=await fetch('monsters_data.json?t='+Date.now());
    MONSTERS=await r.json();
    try{const m=await fetch('data_meta.json?t='+Date.now());const meta=await m.json();DATA_UPDATED_AT=meta.updated_at||'';}catch{}
    updateStats();renderGrid();
    if(IS_GITHUB_PAGES)updateDataStatus();
    toast('✅ 数据已刷新（'+MONSTERS.length+'个怪物）','success');
    btn.textContent='🔄 刷新数据';btn.disabled=false;
  }catch(e){
    toast('刷新失败: '+e.message,'error');
    btn.textContent='❌ 失败';
    setTimeout(()=>{btn.textContent='🔄 刷新数据';btn.disabled=false;},3000);
  }
}

function init(){
  // tabs
  document.querySelectorAll('.tab-btn').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');document.getElementById('tab-'+b.dataset.tab).classList.add('active');
  });
  // filters
  document.querySelectorAll('#tab-monsters .fbtn').forEach(b=>b.onclick=()=>{
    document.querySelectorAll('#tab-monsters .fbtn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');renderGrid();
  });
  // GitHub Pages mode: show refresh button and data status
  if(IS_GITHUB_PAGES){
    document.getElementById('refreshBtn').style.display='';
    document.getElementById('dataStatusBox').style.display='';
  }
  // admin UI
  if(IS_ADMIN){
    document.querySelectorAll('.hide-guest').forEach(el=>el.style.display='');
    document.getElementById('adminBatchBtns').style.display='inline';
  }else{
    document.querySelectorAll('.hide-guest').forEach(el=>el.style.display='none');
  }
  document.getElementById('search').oninput=renderGrid;
  document.getElementById('sortBy').onchange=renderGrid;
  // token passthrough for links
  const QS=location.search||'';
  document.querySelectorAll('a[href]').forEach(a=>{
    const h=a.getAttribute('href');
    if(h&&!h.startsWith('http')&&!h.startsWith('#')&&!h.startsWith('mailto')){
      a.href=h+(h.includes('?')?'&':'?')+QS.replace('?','');
    }
  });
  loadMonsters();
  loadScanStatus();
  scanPolling=setInterval(loadScanStatus,10000);
}
init();
</script>
